name: "Gitleaks Secret Scan"
description: >
  Install gitleaks from a pinned release and scan the repository for leaked
  secrets. No third-party marketplace actions are used — the binary is
  downloaded directly from the official GitHub release and verified with a
  SHA-256 checksum before execution.

inputs:
  config-path:
    description: "Path to the .gitleaks.toml configuration file"
    required: false
    default: ".gitleaks.toml"
  scan-path:
    description: "Directory to scan (defaults to repository root)"
    required: false
    default: "."
  no-git:
    description: "Scan the filesystem directly instead of the git history"
    required: false
    default: "false"
  fail-on-findings:
    description: "Fail the job if secrets are detected (default: true)"
    required: false
    default: "true"

outputs:
  result:
    description: "Scan result: passed or failed"
    value: ${{ steps.scan.outputs.result }}
  findings-count:
    description: "Number of findings detected"
    value: ${{ steps.scan.outputs.findings-count }}

runs:
  using: "composite"
  steps:
    - name: Install gitleaks
      shell: bash
      env:
        # ---------------------------------------------------------------
        # Pinned to v8.24.3. When upgrading, update BOTH the version and
        # ALL checksums below. Checksums sourced from the official release:
        # https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_checksums.txt
        # ---------------------------------------------------------------
        GITLEAKS_VERSION: "8.24.3"
        CHECKSUM_LINUX_AMD64:  "9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
        CHECKSUM_LINUX_ARM64:  "5f2edbe1f49f7b920f9e06e90759947d3c5dfc16f752fb93aaafc17e9d14cf07"
        CHECKSUM_DARWIN_AMD64: "41c44ae8ad1d6eef57d4526ad0fd67d8129eee9a856f55c2b3b9395fd3d9ec0f"
        CHECKSUM_DARWIN_ARM64: "b90f13bb8c90ab72083d9b0c842e39dafb82c0e5c3f872f407366b7a58909013"
      run: |
        set -euo pipefail

        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"

        case "${OS}" in
          linux)
            case "${ARCH}" in
              x86_64)  PLATFORM="linux_x64";   EXPECTED="${CHECKSUM_LINUX_AMD64}"  ;;
              aarch64) PLATFORM="linux_arm64";  EXPECTED="${CHECKSUM_LINUX_ARM64}"  ;;
              *) echo "::error::Unsupported Linux architecture: ${ARCH}"; exit 1    ;;
            esac ;;
          darwin)
            case "${ARCH}" in
              x86_64) PLATFORM="darwin_x64";   EXPECTED="${CHECKSUM_DARWIN_AMD64}" ;;
              arm64)  PLATFORM="darwin_arm64";  EXPECTED="${CHECKSUM_DARWIN_ARM64}" ;;
              *) echo "::error::Unsupported macOS architecture: ${ARCH}"; exit 1    ;;
            esac ;;
          *) echo "::error::Unsupported OS: ${OS}"; exit 1 ;;
        esac

        ARCHIVE="gitleaks_${GITLEAKS_VERSION}_${PLATFORM}.tar.gz"
        URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
        TMP="$(mktemp -d)"
        trap 'rm -rf "${TMP}"' EXIT

        echo "Downloading gitleaks v${GITLEAKS_VERSION} (${PLATFORM})..."
        curl -sSfL -o "${TMP}/${ARCHIVE}" "${URL}"

        echo "Verifying SHA-256 checksum..."
        if command -v sha256sum >/dev/null 2>&1; then
          echo "${EXPECTED}  ${TMP}/${ARCHIVE}" | sha256sum --check --strict -
        else
          echo "${EXPECTED}  ${TMP}/${ARCHIVE}" | shasum -a 256 --check --strict -
        fi
        echo "Checksum verified."

        tar -xzf "${TMP}/${ARCHIVE}" -C "${TMP}" gitleaks
        install -m 0755 "${TMP}/gitleaks" /usr/local/bin/gitleaks

        echo "Installed: $(gitleaks version)"

    - name: Run gitleaks scan
      id: scan
      shell: bash
      env:
        CONFIG_PATH:      ${{ inputs.config-path }}
        SCAN_PATH:        ${{ inputs.scan-path }}
        NO_GIT:           ${{ inputs.no-git }}
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: |
        set -euo pipefail

        REPORT="/tmp/gitleaks-report.json"
        LOG="/tmp/gitleaks-output.txt"

        ARGS=(detect --source "${SCAN_PATH}" --report-format json --report-path "${REPORT}" --exit-code 1)

        if [ -f "${CONFIG_PATH}" ]; then
          ARGS+=(--config "${CONFIG_PATH}")
          CONFIG_DISPLAY="${CONFIG_PATH}"
          echo "Using config: ${CONFIG_PATH}"
        else
          CONFIG_DISPLAY="none — gitleaks built-in defaults"
          echo "Config not found at '${CONFIG_PATH}'; using gitleaks built-in defaults."
        fi

        if [ "${NO_GIT}" = "true" ]; then
          ARGS+=(--no-git)
        fi

        {
          echo "## Gitleaks Secret Scan"
          echo ""
          echo "| Setting | Value |"
          echo "|---------|-------|"
          echo "| Version | \`$(gitleaks version)\` |"
          echo "| Scan path | \`${SCAN_PATH}\` |"
          echo "| Config | \`${CONFIG_DISPLAY}\` |"
          echo "| No-git mode | \`${NO_GIT}\` |"
          echo ""
        } >> "${GITHUB_STEP_SUMMARY}"

        EXIT_CODE=0
        gitleaks "${ARGS[@]}" 2>&1 | tee "${LOG}" || EXIT_CODE=$?

        if [ "${EXIT_CODE}" -eq 0 ]; then
          echo "result=passed"    >> "${GITHUB_OUTPUT}"
          echo "findings-count=0" >> "${GITHUB_OUTPUT}"
          echo "No secrets detected." >> "${GITHUB_STEP_SUMMARY}"
        else
          FINDINGS=0
          if command -v jq >/dev/null 2>&1 && [ -f "${REPORT}" ]; then
            FINDINGS="$(jq 'length' "${REPORT}")"
          fi

          echo "result=failed"                  >> "${GITHUB_OUTPUT}"
          echo "findings-count=${FINDINGS}"      >> "${GITHUB_OUTPUT}"

          {
            echo "**${FINDINGS} secret(s) detected.**"
            echo ""
            echo "<details><summary>Scan output</summary>"
            echo ""
            echo '```'
            cat "${LOG}"
            echo '```'
            echo ""
            echo "</details>"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${FAIL_ON_FINDINGS}" = "true" ]; then
            echo "::error::gitleaks found ${FINDINGS} secret(s). See the job summary for details."
            exit 1
          else
            echo "::warning::gitleaks found ${FINDINGS} secret(s) (scan is non-blocking)."
          fi
        fi

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -f /tmp/gitleaks-report.json /tmp/gitleaks-output.txt
