name: "Guarddog npm Supply-Chain Scan"
description: >
  Install guarddog and verify npm packages listed in package.json for
  supply-chain threats (typosquatting, code injection, exfiltration, etc.)
  BEFORE any dependency is installed.

inputs:
  working-directory:
    description: "Directory containing package.json"
    required: false
    default: "."
  fail-on-findings:
    description: "Fail the step if guarddog detects issues (default: true)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Install guarddog
      shell: bash
      run: pipx install guarddog

    - name: Run guarddog npm verify
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: |
        set -euo pipefail

        if [ ! -f "package.json" ]; then
          echo "::error::package.json not found in $(pwd). guarddog npm verify requires a package.json."
          exit 1
        fi

        {
          echo "## Guarddog npm Supply-Chain Scan"
          echo ""
          echo "| Setting | Value |"
          echo "|---------|-------|"
          echo "| Working directory | \`${{ inputs.working-directory }}\` |"
          echo ""
        } >> "${GITHUB_STEP_SUMMARY}"

        EXIT_CODE=0
        guarddog npm verify package.json 2>&1 | tee /tmp/guarddog-npm-output.txt || EXIT_CODE=$?

        if [ "${EXIT_CODE}" -eq 0 ]; then
          echo "No supply-chain threats detected." >> "${GITHUB_STEP_SUMMARY}"
        else
          {
            echo "**Supply-chain threats detected.**"
            echo ""
            echo "<details><summary>Guarddog output</summary>"
            echo ""
            echo '```'
            cat /tmp/guarddog-npm-output.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${FAIL_ON_FINDINGS}" = "true" ]; then
            echo "::error::guarddog detected potential supply-chain threats in npm packages. See the job summary for details."
            exit 1
          else
            echo "::warning::guarddog detected potential supply-chain threats (scan is non-blocking)."
          fi
        fi

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -f /tmp/guarddog-npm-output.txt
