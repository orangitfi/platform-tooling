name: "Publish Docs to Confluence"
description: "Publishes Markdown documentation to Confluence Cloud with folder hierarchy"
author: "SevendosHQ"

inputs:
  confluence-url:
    description: "Confluence base URL (e.g., https://yourcompany.atlassian.net)"
    required: true
  confluence-user:
    description: "Confluence user email"
    required: true
  confluence-token:
    description: "Confluence API token"
    required: true
  space-key:
    description: "Confluence space key (e.g., DOCS, TECH)"
    required: true
  docs-path:
    description: "Path to documentation folder"
    required: false
    default: "docs"
  root-page-title:
    description: "Title of the root page in Confluence"
    required: false
    default: "Documentation"
  confluence-prefix:
    description: "Optional prefix prepended to all page titles (e.g. '[MyRepo] '). Prevents name collisions when multiple pipelines publish to the same space."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install uv
      shell: bash
      run: pip install uv --quiet

    - name: Install dependencies
      shell: bash
      run: uv pip install --system -r ${{ github.action_path }}/requirements.txt

    - name: Test Confluence connection
      shell: bash
      env:
        CONFLUENCE_URL: ${{ inputs.confluence-url }}
        CONFLUENCE_USER: ${{ inputs.confluence-user }}
        CONFLUENCE_API_TOKEN: ${{ inputs.confluence-token }}
        CONFLUENCE_SPACE_KEY: ${{ inputs.space-key }}
      run: |
        python - <<'EOF'
        import os
        from atlassian import Confluence

        conf = Confluence(
            url=os.environ['CONFLUENCE_URL'],
            username=os.environ['CONFLUENCE_USER'],
            password=os.environ['CONFLUENCE_API_TOKEN'],
            cloud=True
        )

        # Test connection
        try:
            space = conf.get_space(os.environ['CONFLUENCE_SPACE_KEY'])
            print(f"✓ Successfully connected to space: {space['name']}")
            print(f"  Space key: {space['key']}")
            print(f"  Space URL: {space['_links']['webui']}")
        except Exception as e:
            print(f"✗ Failed to connect to Confluence space. Check credentials and space key.")
            exit(1)
        EOF

    - name: Publish to Confluence
      shell: bash
      env:
        CONFLUENCE_URL: ${{ inputs.confluence-url }}
        CONFLUENCE_USER: ${{ inputs.confluence-user }}
        CONFLUENCE_API_TOKEN: ${{ inputs.confluence-token }}
        CONFLUENCE_SPACE_KEY: ${{ inputs.space-key }}
        DOCS_PATH: ${{ inputs.docs-path }}
        ROOT_PAGE_TITLE: ${{ inputs.root-page-title }}
        CONFLUENCE_PREFIX: ${{ inputs.confluence-prefix }}
      run: python ${{ github.action_path }}/publish.py

branding:
  icon: "book-open"
  color: "blue"
