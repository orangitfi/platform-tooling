version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # Python pip dependencies (used by the publish-to-confluence action)
  # Dependabot does not support uv natively; requirements.txt is the source of
  # truth for package versions and is read by uv at install time.
  # uv itself is installed via pip inside the action (no pinned action to track).
  - package-ecosystem: "pip"
    directory: "/.github/actions/publish-to-confluence"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
