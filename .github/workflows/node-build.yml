# Node Build
#
# Reusable workflow that installs dependencies and runs the npm build script.
#
# Usage in a consuming repository:
#
#   jobs:
#     build:
#       uses: your-org/platform-tooling/.github/workflows/node-build.yml@v1
#       with:
#         working-directory: ./src

name: Node Build

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing package.json"
        required: false
        default: "."
        type: string
      build-command:
        description: "npm script to run for building (e.g. build, build:prod)"
        required: false
        default: "build"
        type: string

permissions:
  contents: read

jobs:
  build:
    name: npm Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Build
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.build-command }}
