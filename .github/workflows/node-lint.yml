# Node Lint
#
# Reusable workflow that runs two lint jobs in parallel:
#
#   1. npm lint   — runs the npm lint script (ESLint, Prettier, etc.)
#   2. docker lint — runs hadolint against the Dockerfile
#                    skipped cleanly if no Dockerfile is found
#
# Usage in a consuming repository:
#
#   jobs:
#     lint:
#       uses: orangitfi/platform-tooling/.github/workflows/node-lint.yml@<sha>
#       with:
#         working-directory: ./src
#         dockerfile-path: Dockerfile

name: Node Lint

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing package.json"
        required: false
        default: "."
        type: string
      lint-command:
        description: "npm script to run for linting (e.g. lint, lint:check, lint:ci)"
        required: false
        default: "lint"
        type: string
      dockerfile-path:
        description: "Path to the Dockerfile relative to the repository root"
        required: false
        default: "Dockerfile"
        type: string
      node-version:
        description: "Node.js version to use (e.g. 20, 22)"
        required: false
        default: "20"
        type: string

permissions:
  contents: read

jobs:
  npm-lint:
    name: npm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run lint
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.lint-command }}

  docker-lint:
    name: Docker Lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for Dockerfile
        id: check
        shell: bash
        run: |
          if [ -f "${{ inputs.dockerfile-path }}" ]; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "No Dockerfile found at '${{ inputs.dockerfile-path }}', skipping docker lint."
          fi

      - name: Lint Dockerfile
        if: steps.check.outputs.exists == 'true'
        uses: orangitfi/platform-tooling/.github/actions/docker-lint@f877740fc9a519be6b06492ffd69017337b8ca86 # pt-sha
        with:
          dockerfile: ${{ inputs.dockerfile-path }}
          working-directory: ${{ inputs.working-directory }}
