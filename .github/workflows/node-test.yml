# Node Test
#
# Reusable workflow that runs unit tests and Playwright e2e tests.
# Both jobs are optional and run in parallel when both are enabled.
#
#   - unit-tests  — runs npm run <test-command> (jest, vitest, mocha, etc.)
#   - playwright  — installs browsers, runs Playwright, uploads the HTML
#                   report as an artifact on failure only
#
# Usage in a consuming repository:
#
#   # Unit tests only (default)
#   jobs:
#     test:
#       uses: your-org/platform-tooling/.github/workflows/node-test.yml@v1
#
#   # Unit tests + Playwright
#   jobs:
#     test:
#       uses: your-org/platform-tooling/.github/workflows/node-test.yml@v1
#       with:
#         run-playwright: true
#
#   # Playwright only
#   jobs:
#     test:
#       uses: your-org/platform-tooling/.github/workflows/node-test.yml@v1
#       with:
#         run-unit-tests: false
#         run-playwright: true

name: Node Test

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing package.json"
        required: false
        default: "."
        type: string
      run-unit-tests:
        description: "Run unit tests"
        required: false
        default: true
        type: boolean
      test-command:
        description: "npm script to run for unit tests (e.g. test, test:unit, test:ci)"
        required: false
        default: "test"
        type: string
      run-playwright:
        description: "Run Playwright e2e tests"
        required: false
        default: false
        type: boolean
      playwright-command:
        description: "npm script to run for Playwright tests (e.g. test:e2e, e2e)"
        required: false
        default: "test:e2e"
        type: string

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    if: ${{ inputs.run-unit-tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run unit tests
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.test-command }}

  playwright:
    name: Playwright Tests
    if: ${{ inputs.run-playwright }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Install Playwright browsers
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: npm run ${{ inputs.playwright-command }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: ${{ inputs.working-directory }}/playwright-report/
          retention-days: 7
