# PHP Test
#
# Reusable workflow that installs Composer dependencies and runs PHPUnit.
#
# This covers unit tests only — tests that run without external services
# (no database, no Redis, no message queue). Integration and e2e tests
# that require a live environment are out of scope for this workflow.
#
# Usage in a consuming repository:
#
#   # Minimal: runs PHPUnit from the repo root
#   jobs:
#     test:
#       uses: orangitfi/platform-tooling/.github/workflows/php-test.yml@<sha>
#
#   # Run a specific test suite
#   jobs:
#     test:
#       uses: orangitfi/platform-tooling/.github/workflows/php-test.yml@<sha>
#       with:
#         test-command: "vendor/bin/phpunit --testsuite=Unit"

name: PHP Test

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing composer.json"
        required: false
        default: "."
        type: string
      test-command:
        description: "Command to run tests (e.g. vendor/bin/phpunit, vendor/bin/phpunit --testsuite=Unit -v)"
        required: false
        default: "vendor/bin/phpunit"
        type: string
      composer-args:
        description: "Extra arguments passed to composer install (e.g. --no-dev)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: composer install --no-interaction --prefer-dist --optimize-autoloader ${{ inputs.composer-args }}

      - name: Run tests
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}
